name: benefits_dbt
version: 1.0.0
profile: benefits
require-dbt-version: ">=1.7.0,<2.0.0"

on-run-start:
  - "{{ ensure_mfb_current_white_label_id_function() }}"
  - "{{ enforce_rls_on_marts() }}"

vars:
  # RLS on postgres marts: session_guc (app.white_label_id — index-friendly, MFB-975)
  # Previously regex_user (role name); switched to session_guc to enable index scans.
  mfb_rls_policy_mode: session_guc

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

models:
  benefits_dbt:
    +materialized: view
    postgres:
      +enabled: "{{ target.type == 'postgres' }}"
      staging:
        +materialized: view
        +schema: internal
      intermediate:
        +materialized: view
        +schema: internal
      marts:
        +materialized: table
    bigquery:
      +enabled: "{{ target.type == 'bigquery' }}"
      staging:
        +materialized: view
        +schema: internal
      intermediate:
        +materialized: view
        +schema: internal
      marts:
        +materialized: table
