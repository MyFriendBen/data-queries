version: 2

models:
  - name: stg_referrer_codes
    description: "Maps referrer codes to partner names. Sources from the Django Referrer model."
    columns:
      - name: referrer_code
        description: "The referrer code used to identify partners. Unique per white label, not globally."
      - name: partner
        description: "The display name of the partner associated with the referrer code."
      - name: white_label_code
        description: "The white label code this referrer belongs to."
