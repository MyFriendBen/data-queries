version: 2

models:
  - name: mart_eligible_benefits
    description: "Mart table of per-program eligibility counts by white_label_id and partner. Tracks programs users qualify for — distinct from mart_previous_benefits which tracks programs users report already having. Row-level security restricts each tenant to their own data."
    columns:
      - name: white_label_id
        description: "White label organization ID used for row-level security"
        tests:
          - not_null

      - name: partner
        description: "Referral partner associated with the screener"
        tests:
          - not_null

      - name: benefit
        description: "Benefit category name"
        tests:
          - not_null

      - name: count
        description: "Count of people eligible for the corresponding benefit"
        tests:
          - not_null
